name: Coverage (main)

# CodeScene accepts `cs-coverage upload` only for analysed branches, so
# main-branch coverage is uploaded here on push. The pull-request
# changed-line gate (`cs-coverage check`) is deferred in ci.yml until
# CodeScene enables the coverage-gates configuration for project 79465
# (see the comment there). This workflow also advances the coverage
# ratchet baseline: caches saved on main are readable by every
# pull-request run, so the baseline written here is the one ci.yml's
# ratchet check compares against.

'on':
  push:
    branches: [main]

jobs:
  coverage-upload:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CARGO_TERM_COLOR: always
      BUILD_PROFILE: debug
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
      - name: Setup Rust
        uses: leynos/shared-actions/.github/actions/setup-rust@4d696e72fff6db49f34302ccf119ba978f1032c9
      - name: Generate coverage
        uses: leynos/shared-actions/.github/actions/generate-coverage@4d696e72fff6db49f34302ccf119ba978f1032c9
        with:
          output-path: coverage.xml
          format: cobertura
          with-ratchet: 'true'
          # The coverage interpreter is pinned by .python-version so the
          # baseline seeded here matches ci.yml's measurement. See the
          # comment on the equivalent step in ci.yml.
      - name: Upload coverage data to CodeScene
        env:
          CS_ACCESS_TOKEN: ${{ secrets.CS_ACCESS_TOKEN }}
        if: ${{ env.CS_ACCESS_TOKEN }}
        uses: leynos/shared-actions/.github/actions/upload-codescene-coverage@18bed1ca49a6de3d8882bd72635a32ae3f023d57
        with:
          format: cobertura
          access-token: ${{ env.CS_ACCESS_TOKEN }}
          installer-checksum: ${{ vars.CODESCENE_CLI_SHA256 }}
