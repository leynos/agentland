name: CI

'on':
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

jobs:
  build-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CARGO_TERM_COLOR: always
      BUILD_PROFILE: debug
      WHITAKER_INSTALLER_VERSION: '0.2.6'
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
        with:
          fetch-depth: 0
      - name: Setup Rust
        uses: leynos/shared-actions/.github/actions/setup-rust@c3141c3d4cb2a2828d2abbcf3d94b15197740c58
      - name: Setup uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990
        with:
          enable-cache: false
      - name: Install Markdown diagram tooling
        run: |
          uv tool install nixie-cli==1.1.0
          cargo install merman-cli --version 0.7.0 --locked
      - name: Spelling
        run: make spelling
      - name: Mermaid diagrams
        run: make nixie
      - name: Format
        run: make check-fmt
      - name: Markdown lint
        uses: DavidAnson/markdownlint-cli2-action@8de2aa07cae85fd17c0b35642db70cf5495f1d25
        with:
          globs: |
            **/*.md
            !**/target/**
            !**/dist/**
      - name: Cache whitaker-installer
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4.3.0
        with:
          path: |
            ~/.cargo/bin/whitaker-installer
            ~/.cache/cargo-binstall
          key: whitaker-installer-${{ runner.os }}-${{ runner.arch }}-${{ env.WHITAKER_INSTALLER_VERSION }}
      - name: Install the Whitaker Dylint suite
        run: |
          if ! command -v whitaker-installer >/dev/null 2>&1; then
            if cargo binstall --version >/dev/null 2>&1; then
              cargo binstall --no-confirm --locked "whitaker-installer@${WHITAKER_INSTALLER_VERSION}"
            else
              echo "cargo-binstall unavailable; building whitaker-installer from crates.io"
              cargo install --locked whitaker-installer --version "${WHITAKER_INSTALLER_VERSION}"
            fi
          fi
          # The repository does not use the Cranelift backend, so the
          # default installer invocation suffices.
          whitaker-installer
      - name: Lint
        run: make lint
      - name: Test and Measure Coverage
        uses: leynos/shared-actions/.github/actions/generate-coverage@4d696e72fff6db49f34302ccf119ba978f1032c9
        with:
          output-path: coverage.xml
          format: cobertura
          with-ratchet: 'true'
          # The Python interpreter for the coverage run is pinned by the
          # repository's .python-version file. Slipcover's line accounting
          # differs between interpreter versions (94.30% on 3.12 vs 91.71%
          # on 3.14 for identical source), so this job and coverage-main
          # must resolve the same Python or the ratchet baseline drifts.
      - name: Check coverage against CodeScene gates
        env:
          CS_ACCESS_TOKEN: ${{ secrets.CS_ACCESS_TOKEN }}
        if: env.CS_ACCESS_TOKEN != '' && github.event_name == 'pull_request'
        uses: leynos/shared-actions/.github/actions/upload-codescene-coverage@18bed1ca49a6de3d8882bd72635a32ae3f023d57
        with:
          format: cobertura
          mode: check
          project-url: https://api.codescene.io/v2/projects/79465
          access-token: ${{ env.CS_ACCESS_TOKEN }}
          installer-checksum: ${{ vars.CODESCENE_CLI_SHA256 }}
